<template>
    <div class="login-wrapper">
        <div class="login-glass-card">
            <div class="brand">
                <div class="logo">✏️</div>
                <h1>Çözüm Köşesi</h1>
                <p>Öğrenci &amp; Veli Giriş Portalı</p>
            </div>

            <template if:true={errorMsg}>
                <div class="error-alert animate-fade">
                    <span class="error-icon">⚠️</span>
                    <span class="error-text">{errorMsg}</span>
                </div>
            </template>

            <template if:true={isLoading}>
                <div class="spinner-container">
                    <div class="custom-spinner"></div>
                    <p class="spinner-text">Kontrol ediliyor...</p>
                </div>
            </template>

            <template if:false={isStepTwo}>
                <form class="login-form animate-slide" onsubmit={handleNextStep}>
                    <div class="input-group">
                        <label class="input-label">E-posta Adresi</label>
                        <div class="input-wrapper">
                            <span class="input-icon">✉️</span>
                            <input type="email" class="glass-input" placeholder="E-posta adresinizi yazın"
                                value={username} oninput={handleUsernameChange} required disabled={isLoading} />
                        </div>
                    </div>
                    <button type="submit" class="glass-button" disabled={isLoading}>Sonraki Adım →</button>
                </form>
            </template>

            <template if:true={isStepTwo}>
                <div class="welcome-container animate-fade">
                    <p class="greeting-text">Hoş Geldiniz</p>
                    <h3 class="user-name">{detectedName}</h3>
                    <div class={roleBadgeClass}>{roleLabel} Portalı</div>
                </div>

                <form class="login-form animate-slide" onsubmit={doLogin}>
                    <div class="input-group">
                        <label class="input-label">Giriş Şifresi</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🔐</span>
                            <input type="password" class="glass-input" placeholder="Şifrenizi yazın"
                                value={password} oninput={handlePasswordChange} required autofocus disabled={isLoading} />
                        </div>
                    </div>
                    <div class="actions-row">
                        <button type="button" class="btn-secondary-custom" onclick={handlePrevStep} disabled={isLoading}>← Geri</button>
                        <button type="submit" class="glass-button flex-grow" disabled={isLoading}>Giriş Yap</button>
                    </div>
                </form>
            </template>
        </div>
    </div>
</template>
