<template>
    <div class="dashboard-wrapper">
        <!-- SIDEBAR -->
        <aside class="glass-sidebar">
            <div class="brand-logo">
                <span class="logo-emoji">✏️</span>
                <span class="brand-text">Çözüm Köşesi</span>
            </div>

            <div class="parent-profile-badge">
                <div class="parent-avatar">👨‍👩‍👦</div>
                <h4>{parentName}</h4>
                <p class="parent-sub">Veli Hesabı</p>
                <div class="parent-contact">
                    <span>✉️ {parentEmail}</span>
                    <span>📞 {parentPhone}</span>
                </div>
            </div>

            <ul class="nav-links">
                <li class={sidebarFinanceClass}>
                    <a href="#" data-tab="finance" onclick={handleTabClick}>
                        <span class="nav-icon">💳</span> Borç &amp; Ödeme
                    </a>
                </li>
                <li class={sidebarLessonsClass}>
                    <a href="#" data-tab="lessons" onclick={handleTabClick}>
                        <span class="nav-icon">📅</span> Ders Programı
                    </a>
                </li>
                <li class={sidebarHomeworksClass}>
                    <a href="#" data-tab="homeworks" onclick={handleTabClick}>
                        <span class="nav-icon">📚</span> Ödev Durumu
                    </a>
                </li>
                <li class={sidebarExamsClass}>
                    <a href="#" data-tab="exams" onclick={handleTabClick}>
                        <span class="nav-icon">📈</span> Deneme Analizi
                    </a>
                </li>
                <li class={sidebarPasswordClass}>
                    <a href="#" data-tab="password" onclick={handleTabClick}>
                        <span class="nav-icon">🔐</span> Şifre Değiştir
                    </a>
                </li>
            </ul>

            <div class="sidebar-footer">
                <button class="btn-logout" onclick={handleLogout}>🚪 Çıkış Yap</button>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="main-content">
            <template if:true={isLoading}>
                <div class="loader-overlay">
                    <div class="custom-spinner"></div>
                    <p class="loader-text">Yükleniyor...</p>
                </div>
            </template>

            <template if:false={isLoading}>
                <!-- Child Selector -->
                <header class="sibling-header glass-card">
                    <div class="sibling-selector">
                        <label class="selector-label">ÖĞRENCİ SEÇİMİ:</label>
                        <template if:true={hasChildren}>
                            <div class="siblings-row">
                                <template for:each={childrenList} for:item="child">
                                    <button key={child.Id} class={child.btnClass} data-id={child.Id} onclick={handleSiblingChange}>
                                        🎓 {child.Name}
                                    </button>
                                </template>
                            </div>
                        </template>
                        <template if:false={hasChildren}>
                            <p class="empty-state">Kayıtlı öğrenciniz bulunmuyor.</p>
                        </template>
                    </div>
                    <template if:true={selectedStudent}>
                        <div class="student-meta-summary">
                            <div class="meta-pill">🏫 {selectedStudent.School__c}</div>
                            <div class="meta-pill accent">{selectedStudent.Grade__c}</div>
                            <template if:true={selectedStudent.Student_Type__c}>
                                <div class="meta-pill purple">{selectedStudent.Student_Type__c}</div>
                            </template>
                        </div>
                    </template>
                </header>

                <template if:true={selectedStudent}>

                    <!-- ===== TAB: FINANCE ===== -->
                    <template if:true={isFinanceActive}>
                        <div class="tab-content animate-fade">

                            <!-- Summary Metrics -->
                            <div class="financial-metrics-grid">
                                <div class="finance-card glass-card fc-blue">
                                    <div class="fin-icon">📊</div>
                                    <div class="fin-body">
                                        <h4>Toplam Ders Ücreti</h4>
                                        <h2>{totalLessonFeeFormatted} ₺</h2>
                                    </div>
                                </div>
                                <div class="finance-card glass-card fc-green">
                                    <div class="fin-icon">✅</div>
                                    <div class="fin-body">
                                        <h4>Toplam Ödenen</h4>
                                        <h2>{totalPaidFormatted} ₺</h2>
                                    </div>
                                </div>
                                <div class="finance-card glass-card fc-red">
                                    <div class="fin-icon">⚠️</div>
                                    <div class="fin-body">
                                        <h4>Kalan Borç</h4>
                                        <h2>{balanceFormatted} ₺</h2>
                                        <template if:true={hasOverdue}>
                                            <p class="fin-sub overdue-sub">{overdueCount} ders tutarı gecikmiş</p>
                                        </template>
                                    </div>
                                </div>
                            </div>

                            <!-- Overdue Lessons -->
                            <template if:true={hasOverdue}>
                                <div class="section-card glass-card overdue-card">
                                    <div class="overdue-header">
                                        <h2 class="section-title">⏰ Gecikmiş Ders Ödemeleri</h2>
                                        <span class="overdue-badge">{overdueCount} Gecikmiş</span>
                                    </div>
                                    <p class="overdue-desc">Aşağıdaki ders ödemeleri henüz karşılanamamıştır. En eski tarihten başlayarak listelenmiştir.</p>
                                    <div class="table-responsive">
                                        <table class="premium-table">
                                            <thead>
                                                <tr>
                                                    <th>Ders</th>
                                                    <th>Ders Tarihi</th>
                                                    <th>Branş</th>
                                                    <th>Tutar</th>
                                                    <th>Gecikme</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <template for:each={overdueItems} for:item="item">
                                                    <tr key={item.Id}>
                                                        <td class="font-bold">{item.Name}</td>
                                                        <td>{item.dateStr}</td>
                                                        <td>{item.Branch__c}</td>
                                                        <td class="font-bold text-red">{item.feeFormatted} ₺</td>
                                                        <td>
                                                            <span class={item.delayClass}>{item.delayLabel}</span>
                                                        </td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </template>

                            <!-- Payments History -->
                            <div class="section-card glass-card mt-4">
                                <h2 class="section-title">💳 Yapılan Ödemeler</h2>
                                <template if:true={payments.length}>
                                    <div class="table-responsive">
                                        <table class="premium-table">
                                            <thead>
                                                <tr>
                                                    <th>Makbuz</th>
                                                    <th>Tarih</th>
                                                    <th>Yöntem</th>
                                                    <th>Tutar</th>
                                                    <th>Durum</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <template for:each={payments} for:item="p">
                                                    <tr key={p.Id}>
                                                        <td class="font-bold">{p.Name}</td>
                                                        <td>{p.paymentDateStr}</td>
                                                        <td>{p.Payment_Method__c}</td>
                                                        <td class="font-bold text-green">{p.amountFormatted} ₺</td>
                                                        <td><span class="badge-status paid">{p.Status__c}</span></td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </div>
                                </template>
                                <template if:false={payments.length}>
                                    <div class="empty-state">Henüz ödeme kaydı bulunmuyor.</div>
                                </template>
                            </div>
                        </div>
                    </template>

                    <!-- ===== TAB: LESSONS ===== -->
                    <template if:true={isLessonsActive}>
                        <div class="tab-content animate-fade">
                            <div class="section-card glass-card">
                                <h2 class="section-title">📅 {selectedStudent.Name} — Ders Programı</h2>
                                <template if:true={lessons.length}>
                                    <div class="table-responsive">
                                        <table class="premium-table">
                                            <thead>
                                                <tr>
                                                    <th>Ders</th>
                                                    <th>Tarih &amp; Saat</th>
                                                    <th>Branş</th>
                                                    <th>Süre</th>
                                                    <th>Tutar</th>
                                                    <th>Durum</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <template for:each={lessons} for:item="lesson">
                                                    <tr key={lesson.Id}>
                                                        <td class="font-bold">{lesson.Name}</td>
                                                        <td>{lesson.dateTimeStr}</td>
                                                        <td>{lesson.Branch__c}</td>
                                                        <td>⏱ {lesson.Duration_Minutes__c} dk</td>
                                                        <td class="font-bold text-purple">{lesson.feeFormatted} ₺</td>
                                                        <td><span class="badge-status">{lesson.Status__c}</span></td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </div>
                                    <!-- Lesson Notes -->
                                    <template for:each={lessonsWithNotes} for:item="ln">
                                        <div key={ln.Id} class="lesson-note-box">
                                            <div class="ln-header">
                                                <span class="ln-date">📝 {ln.dateShort} — {ln.Branch__c}</span>
                                            </div>
                                            <p class="ln-text">{ln.Lesson_Notes__c}</p>
                                        </div>
                                    </template>
                                </template>
                                <template if:false={lessons.length}>
                                    <div class="empty-state">Kayıtlı ders planı bulunamadı.</div>
                                </template>
                            </div>
                        </div>
                    </template>

                    <!-- ===== TAB: HOMEWORKS ===== -->
                    <template if:true={isHomeworksActive}>
                        <div class="tab-content animate-fade">
                            <div class="section-card glass-card">
                                <h2 class="section-title">📚 {selectedStudent.Name} — Ödev Durumu</h2>
                                <template if:true={homeworks.length}>
                                    <div class="homeworks-grid">
                                        <template for:each={homeworks} for:item="hw">
                                            <div key={hw.Id} class="homework-card glass-card">
                                                <div class="hw-header">
                                                    <h3>{hw.Title__c}</h3>
                                                    <span class={hw.badgeClass}>{hw.statusText}</span>
                                                </div>
                                                <p class="hw-desc">{hw.Description__c}</p>
                                                <div class="hw-meta">
                                                    <span>📅 Son Teslim: {hw.dueDateStr}</span>
                                                </div>
                                                <template if:true={hw.Completed_Questions__c}>
                                                    <div class="hw-stats-box">
                                                        <div class="stats-row">
                                                            <span>Çözülen: <strong>{hw.Completed_Questions__c}</strong></span>
                                                            <span class="text-green">✔ Doğru: <strong>{hw.Correct_Answers__c}</strong></span>
                                                            <span class="text-red">✘ Yanlış: <strong>{hw.Wrong_Answers__c}</strong></span>
                                                        </div>
                                                        <template if:true={hw.Student_Comment__c}>
                                                            <p class="comment-text">"<em>{hw.Student_Comment__c}</em>"</p>
                                                        </template>
                                                    </div>
                                                </template>
                                                <template if:true={hw.isGraded}>
                                                    <div class="teacher-feedback-box">
                                                        <p class="grade-label">💯 Puan: <strong>{hw.Grade__c} / 100</strong></p>
                                                        <template if:true={hw.Teacher_Comment__c}>
                                                            <p class="comment-text"><strong>Öğretmen:</strong> "{hw.Teacher_Comment__c}"</p>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                                <template if:false={homeworks.length}>
                                    <div class="empty-state">Ödev tanımı bulunmuyor.</div>
                                </template>
                            </div>
                        </div>
                    </template>

                    <!-- ===== TAB: EXAMS ===== -->
                    <template if:true={isExamsActive}>
                        <div class="tab-content animate-fade">
                            <div class="section-card glass-card">
                                <h2 class="section-title">📈 {selectedStudent.Name} — Deneme Analizi</h2>
                                <template if:true={exams.length}>
                                    <div class="visual-exam-cards">
                                        <template for:each={exams} for:item="ex">
                                            <div key={ex.Id} class="exam-visual-card glass-card">
                                                <div class="ex-header">
                                                    <h5>{ex.Exam_Title__c}</h5>
                                                    <span class="badge-score">{ex.Score__c}%</span>
                                                </div>
                                                <p class="ex-date">{ex.examDateStr}</p>
                                                <div class="net-bar-container">
                                                    <div class="bar-label-row">
                                                        <span>Toplam Net</span>
                                                        <span class="font-bold text-purple">{ex.totalNetFormatted}</span>
                                                    </div>
                                                    <div class="bar-outer"><div class="bar-inner total-bar" style={ex.totalNetStyle}></div></div>
                                                </div>
                                                <div class="net-bar-container">
                                                    <div class="bar-label-row">
                                                        <span>Matematik Net</span>
                                                        <span class="font-bold text-accent">{ex.mathNetFormatted}</span>
                                                    </div>
                                                    <div class="bar-outer"><div class="bar-inner math-bar" style={ex.mathNetStyle}></div></div>
                                                </div>
                                                <template if:true={ex.Teacher_Feedback__c}>
                                                    <p class="ex-feedback">{ex.Teacher_Feedback__c}</p>
                                                </template>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                                <template if:false={exams.length}>
                                    <div class="empty-state">Kayıtlı deneme sınavı bulunmuyor.</div>
                                </template>
                            </div>
                        </div>
                    </template>

                </template>

                <!-- ===== TAB: PASSWORD ===== -->
                <template if:true={isPasswordActive}>
                    <div class="tab-content animate-fade">
                        <div class="section-card glass-card max-w-sm">
                            <h2 class="section-title">🔐 Şifre Güncelle</h2>
                            <template if:true={pwdErrorMsg}>
                                <div class="alert-error animate-fade">{pwdErrorMsg}</div>
                            </template>
                            <template if:true={pwdSuccessMsg}>
                                <div class="alert-success animate-fade">{pwdSuccessMsg}</div>
                            </template>
                            <form class="password-form" onsubmit={handlePasswordSubmit}>
                                <div class="input-group">
                                    <label class="input-label">Mevcut Şifre</label>
                                    <input type="password" class="form-input" value={currentPassword} oninput={handleCurPwd} required />
                                </div>
                                <div class="input-group">
                                    <label class="input-label">Yeni Şifre (En az 6 karakter)</label>
                                    <input type="password" class="form-input" value={newPassword} oninput={handleNewPwd} required />
                                </div>
                                <div class="input-group">
                                    <label class="input-label">Yeni Şifre (Tekrar)</label>
                                    <input type="password" class="form-input" value={confirmPassword} oninput={handleConfPwd} required />
                                </div>
                                <button type="submit" class="btn-submit mt-4">Şifremi Güncelle</button>
                            </form>
                        </div>
                    </div>
                </template>
            </template>
        </main>
    </div>
</template>
