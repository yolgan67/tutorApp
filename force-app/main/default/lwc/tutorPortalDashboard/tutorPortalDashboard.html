<template>
    <div class="dashboard-wrapper">

        <!-- HEADER -->
        <header class="dash-header glass-header">
            <div class="brand">
                <span class="logo-emoji">✏️</span>
                <div class="brand-body">
                    <span class="brand-name">Çözüm Köşesi</span>
                    <span class="brand-role">Eğitmen Paneli</span>
                </div>
            </div>
            <nav class="header-nav">
                <button class={calendarTabClass} onclick={selectCalendarTab}>📅 Ders Takvimi</button>
                <button class={studentsTabClass} onclick={selectStudentsTab}>👥 Öğrenci Takibi</button>
            </nav>
            <button class="btn-logout" onclick={handleLogout}>🚪 Çıkış</button>
        </header>

        <!-- TODAY'S LESSONS STRIP -->
        <div class="today-strip">
            <div class="today-strip-label">
                <span class="today-icon">🌅</span>
                <div>
                    <p class="today-title">Bugünün Dersleri</p>
                    <p class="today-date">{todayDateStr}</p>
                </div>
            </div>
            <template if:true={hasTodayLessons}>
                <div class="today-lessons-scroll">
                    <template for:each={todayLessons} for:item="lesson">
                        <div key={lesson.Id} class="today-lesson-card">
                            <p class="tlc-time">⏰ {lesson.timeStr}</p>
                            <p class="tlc-student">👤 {lesson.studentName}</p>
                            <p class="tlc-branch">📐 {lesson.Branch__c}</p>
                            <span class={lesson.statusClass}>{lesson.Status__c}</span>
                        </div>
                    </template>
                </div>
            </template>
            <template if:false={hasTodayLessons}>
                <p class="today-empty">Bugün planlanmış ders bulunmuyor. İyi dinlenmeler! ☕</p>
            </template>
        </div>

        <!-- MAIN BODY -->
        <main class="dashboard-body">
            <template if:true={isLoading}>
                <div class="loader-container">
                    <div class="custom-spinner"></div>
                    <p class="loader-text">Yükleniyor...</p>
                </div>
            </template>

            <template if:false={isLoading}>

                <!-- TAB 1: CALENDAR -->
                <template if:true={isCalendarTab}>
                    <div class="tab-content animate-fade">
                        <c-tutor-schedule-calendar></c-tutor-schedule-calendar>
                    </div>
                </template>

                <!-- TAB 2: STUDENTS -->
                <template if:true={isStudentsTab}>
                    <div class="tab-content animate-fade">

                        <!-- LIST VIEW -->
                        <template if:false={selectedStudent}>
                            <div class="students-list-view">
                                <h2 class="view-title">Kayıtlı Öğrenci Listesi</h2>
                                <div class="students-grid">
                                    <template for:each={students} for:item="student">
                                        <div key={student.Id} class="student-card glass-card" data-id={student.Id} onclick={handleStudentClick}>
                                            <div class="sc-avatar">👨‍🎓</div>
                                            <div class="sc-info">
                                                <h3>{student.First_Name__c} {student.Last_Name__c}</h3>
                                                <p class="sc-school">🏫 {student.School__c}</p>
                                                <div class="sc-pills">
                                                    <span class="pill pill-grade">{student.Grade__c}</span>
                                                    <template if:true={student.Student_Type__c}>
                                                        <span class="pill pill-type">{student.Student_Type__c}</span>
                                                    </template>
                                                </div>
                                            </div>
                                            <div class="sc-balance">
                                                <p class="sc-balance-lbl">Bakiye</p>
                                                <p class="sc-balance-val">{student.Balance__c} TL</p>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>

                        <!-- DETAIL VIEW -->
                        <template if:true={selectedStudent}>
                            <div class="student-details-view animate-fade">
                                <div class="details-top-bar">
                                    <button class="btn-back" onclick={handleBackToList}>← Listeye Dön</button>
                                    <div class="details-title-wrap">
                                        <h2>{selectedStudent.First_Name__c} {selectedStudent.Last_Name__c}</h2>
                                        <template if:true={selectedStudent.Student_Type__c}>
                                            <span class="pill pill-type">{selectedStudent.Student_Type__c}</span>
                                        </template>
                                        <div class="fin-summary-row">
                                            <span class="fin-chip">Ders Ücreti: <strong>{selectedStudent.Total_Lesson_Fee__c} TL</strong></span>
                                            <span class="fin-chip green">Ödenen: <strong>{selectedStudent.Total_Paid_Amount__c} TL</strong></span>
                                            <span class="fin-chip red">Bakiye: <strong>{selectedStudent.Balance__c} TL</strong></span>
                                        </div>
                                    </div>
                                </div>

                                <div class="details-workspace">
                                    <!-- LEFT: Main records -->
                                    <div class="workspace-main">

                                        <!-- Homeworks -->
                                        <div class="workspace-card glass-card">
                                            <div class="wc-header">
                                                <h3>📚 Ödevler</h3>
                                                <button class="btn-mini" onclick={openHomeworkModal}>+ Yeni Ödev Ata</button>
                                            </div>
                                            <template if:true={studentDetails.homeworks.length}>
                                                <div class="hw-stack">
                                                    <template for:each={studentDetails.homeworks} for:item="hw">
                                                        <div key={hw.Id} class="hw-item glass-card">
                                                            <div class="hw-top">
                                                                <h4>{hw.Title__c}</h4>
                                                                <span class={hw.badgeClass}>{hw.statusText}</span>
                                                            </div>
                                                            <p class="hw-desc">{hw.Description__c}</p>
                                                            <div class="hw-meta">
                                                                <span>📅 Son Teslim: {hw.Due_Date__c}</span>
                                                                <span>📐 {hw.Lesson__r.Branch__c}</span>
                                                            </div>
                                                            <template if:true={hw.Completed_Questions__c}>
                                                                <div class="hw-report-box">
                                                                    <div class="report-row">
                                                                        <span>Çözülen: <strong>{hw.Completed_Questions__c}</strong></span>
                                                                        <span class="text-green">✔ Doğru: <strong>{hw.Correct_Answers__c}</strong></span>
                                                                        <span class="text-red">✘ Yanlış: <strong>{hw.Wrong_Answers__c}</strong></span>
                                                                    </div>
                                                                    <template if:true={hw.Student_Comment__c}>
                                                                        <p class="comment-text">"<em>{hw.Student_Comment__c}</em>"</p>
                                                                    </template>
                                                                </div>
                                                            </template>
                                                            <template if:true={hw.isGraded}>
                                                                <div class="hw-grade-box">
                                                                    <p>💯 Puan: <strong>{hw.Grade__c}/100</strong></p>
                                                                    <template if:true={hw.Teacher_Comment__c}>
                                                                        <p class="comment-text"><strong>Geri Bildirim:</strong> "<em>{hw.Teacher_Comment__c}</em>"</p>
                                                                    </template>
                                                                </div>
                                                            </template>
                                                            <template if:true={hw.isGradeable}>
                                                                <button class="btn-grade" data-id={hw.Id} onclick={openGradeModal}>{hw.gradeButtonText}</button>
                                                            </template>
                                                        </div>
                                                    </template>
                                                </div>
                                            </template>
                                            <template if:false={studentDetails.homeworks.length}>
                                                <p class="empty-lbl">Kayıtlı ödev yok.</p>
                                            </template>
                                        </div>

                                        <!-- Lessons -->
                                        <div class="workspace-card glass-card mt-4">
                                            <h3>📅 Ders Geçmişi & Planları</h3>
                                            <div class="lessons-two-col">
                                                <div class="lessons-panel">
                                                    <h4 class="panel-sub-title">Planlanan Dersler</h4>
                                                    <template if:true={studentDetails.futureLessons.length}>
                                                        <ul class="lesson-list">
                                                            <template for:each={studentDetails.futureLessons} for:item="lesson">
                                                                <li key={lesson.Id} class="lesson-li">
                                                                    <span class="ll-branch">📐 <strong>{lesson.Branch__c}</strong></span>
                                                                    <span class="ll-time">{lesson.Date_Time__c} ({lesson.Duration_Minutes__c} dk)</span>
                                                                    <span class="badge-sched">Planlandı</span>
                                                                </li>
                                                            </template>
                                                        </ul>
                                                    </template>
                                                    <template if:false={studentDetails.futureLessons.length}>
                                                        <p class="empty-lbl">Yaklaşan ders yok.</p>
                                                    </template>
                                                </div>
                                                <div class="lessons-panel">
                                                    <h4 class="panel-sub-title">Geçmiş Dersler</h4>
                                                    <template if:true={studentDetails.pastLessons.length}>
                                                        <ul class="lesson-list">
                                                            <template for:each={studentDetails.pastLessons} for:item="lesson">
                                                                <li key={lesson.Id} class="lesson-li">
                                                                    <span class="ll-branch">📐 <strong>{lesson.Branch__c}</strong></span>
                                                                    <span class="ll-time">{lesson.Date_Time__c} ({lesson.Duration_Minutes__c} dk)</span>
                                                                    <span class="ll-fee text-accent">{lesson.feeFormatted} TL</span>
                                                                </li>
                                                            </template>
                                                        </ul>
                                                    </template>
                                                    <template if:false={studentDetails.pastLessons.length}>
                                                        <p class="empty-lbl">Geçmiş ders yok.</p>
                                                    </template>
                                                </div>
                                            </div>
                                        </div>

                                        <!-- Payments -->
                                        <div class="workspace-card glass-card mt-4">
                                            <div class="wc-header">
                                                <h3>💳 Ödemeler</h3>
                                                <button class="btn-mini" onclick={openPaymentModal}>+ Ödeme Kaydet</button>
                                            </div>
                                            <template if:true={studentDetails.payments.length}>
                                                <div class="table-responsive">
                                                    <table class="premium-table">
                                                        <thead>
                                                            <tr>
                                                                <th>Kayıt</th>
                                                                <th>Tarih</th>
                                                                <th>Yöntem</th>
                                                                <th>Tutar</th>
                                                                <th>Durum</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody>
                                                            <template for:each={studentDetails.payments} for:item="p">
                                                                <tr key={p.Id}>
                                                                    <td class="font-bold">{p.Name}</td>
                                                                    <td>{p.Payment_Date__c}</td>
                                                                    <td>{p.Payment_Method__c}</td>
                                                                    <td class="font-bold text-green">{p.amountFormatted} TL</td>
                                                                    <td><span class="badge-sched">{p.Status__c}</span></td>
                                                                </tr>
                                                            </template>
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </template>
                                            <template if:false={studentDetails.payments.length}>
                                                <p class="empty-lbl">Kayıtlı ödeme yok.</p>
                                            </template>
                                        </div>
                                    </div>

                                    <!-- RIGHT: Sticky info -->
                                    <div class="workspace-sidebar">
                                        <div class="sticky-info-card glass-card">
                                            <div class="si-avatar">👨‍🎓</div>
                                            <h3 class="si-title">Öğrenci &amp; Veli Bilgileri</h3>
                                            <div class="info-list">
                                                <div class="info-row"><span class="ir-lbl">Sınıf:</span><span class="ir-val">{selectedStudent.Grade__c}</span></div>
                                                <div class="info-row"><span class="ir-lbl">Okul:</span><span class="ir-val">{selectedStudent.School__c}</span></div>
                                                <template if:true={selectedStudent.Student_Type__c}>
                                                    <div class="info-row"><span class="ir-lbl">Tür:</span><span class="ir-val pill pill-type">{selectedStudent.Student_Type__c}</span></div>
                                                </template>
                                                <div class="info-row"><span class="ir-lbl">Kayıt:</span><span class="ir-val">{studentDetails.regDate}</span></div>
                                            </div>
                                            <div class="si-divider"></div>
                                            <div class="info-list">
                                                <div class="info-row"><span class="ir-lbl">Veli:</span><span class="ir-val font-bold">{studentDetails.parentName}</span></div>
                                                <div class="info-row"><span class="ir-lbl">Telefon:</span><span class="ir-val text-primary">{studentDetails.parentPhone}</span></div>
                                                <div class="info-row"><span class="ir-lbl">E-posta:</span><span class="ir-val">{studentDetails.parentEmail}</span></div>
                                            </div>
                                            <div class="si-divider"></div>
                                            <h4 class="si-subtitle">📝 Son Deneme Netleri</h4>
                                            <template if:true={studentDetails.exams.length}>
                                                <ul class="exams-list">
                                                    <template for:each={studentDetails.exams} for:item="ex">
                                                        <li key={ex.Id} class="exam-item glass-card">
                                                            <div class="ex-top">
                                                                <strong>{ex.Exam_Title__c}</strong>
                                                                <span class="ex-date">{ex.Date__c}</span>
                                                            </div>
                                                            <div class="ex-nets">
                                                                <span class="net-chip primary">Toplam: <strong>{ex.totalNetFormatted}</strong></span>
                                                                <span class="net-chip accent">Mat: <strong>{ex.mathNetFormatted}</strong></span>
                                                            </div>
                                                        </li>
                                                    </template>
                                                </ul>
                                            </template>
                                            <template if:false={studentDetails.exams.length}>
                                                <p class="empty-lbl">Deneme kaydı yok.</p>
                                            </template>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>

            </template>
        </main>

        <!-- MODAL: Homework -->
        <template if:true={isHomeworkModalOpen}>
            <div class="modal-backdrop" onclick={closeModals}>
                <div class="modal-card glass-card animate-zoom" onclick={stopPropagation}>
                    <div class="modal-header">
                        <h3>📚 Ödev Ata — {selectedStudent.First_Name__c}</h3>
                        <button class="modal-close" onclick={closeModals}>&times;</button>
                    </div>
                    <div class="modal-body">
                        <div class="form-group">
                            <label class="form-label">Ödev Başlığı</label>
                            <input type="text" class="form-input" data-field="Title__c" value={newHomework.Title__c} oninput={handleHomeworkChange} required />
                        </div>
                        <div class="form-group">
                            <label class="form-label">Açıklama</label>
                            <textarea class="form-input" data-field="Description__c" value={newHomework.Description__c} oninput={handleHomeworkChange} rows="3"></textarea>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Son Teslim Tarihi</label>
                            <input type="date" class="form-input" data-field="Due_Date__c" value={newHomework.Due_Date__c} oninput={handleHomeworkChange} required />
                        </div>
                        <div class="modal-actions">
                            <button class="btn-secondary" onclick={closeModals}>Vazgeç</button>
                            <button class="btn-primary" onclick={saveHomework}>Ödevi Ata</button>
                        </div>
                    </div>
                </div>
            </div>
        </template>

        <!-- MODAL: Payment -->
        <template if:true={isPaymentModalOpen}>
            <div class="modal-backdrop" onclick={closeModals}>
                <div class="modal-card glass-card animate-zoom" onclick={stopPropagation}>
                    <div class="modal-header">
                        <h3>💳 Ödeme Kaydı — {selectedStudent.First_Name__c}</h3>
                        <button class="modal-close" onclick={closeModals}>&times;</button>
                    </div>
                    <div class="modal-body">
                        <div class="form-group">
                            <label class="form-label">Tutar (TL)</label>
                            <input type="number" class="form-input" data-field="Amount__c" value={newPayment.Amount__c} oninput={handlePaymentChange} required />
                        </div>
                        <div class="form-group">
                            <label class="form-label">Ödeme Tarihi</label>
                            <input type="date" class="form-input" data-field="Payment_Date__c" value={newPayment.Payment_Date__c} oninput={handlePaymentChange} required />
                        </div>
                        <div class="form-group">
                            <label class="form-label">Ödeme Yöntemi</label>
                            <select class="form-input" data-field="Payment_Method__c" value={newPayment.Payment_Method__c} onchange={handlePaymentChange}>
                                <option value="Cash">Nakit</option>
                                <option value="Bank Transfer">Banka/Havale</option>
                                <option value="Credit Card">Kredi Kartı</option>
                            </select>
                        </div>
                        <div class="modal-actions">
                            <button class="btn-secondary" onclick={closeModals}>Vazgeç</button>
                            <button class="btn-primary" onclick={savePayment}>Kaydet</button>
                        </div>
                    </div>
                </div>
            </div>
        </template>

        <!-- MODAL: Grade -->
        <template if:true={isGradeModalOpen}>
            <div class="modal-backdrop" onclick={closeModals}>
                <div class="modal-card glass-card animate-zoom" onclick={stopPropagation}>
                    <div class="modal-header">
                        <h3>{gradeModalTitle}</h3>
                        <button class="modal-close" onclick={closeModals}>&times;</button>
                    </div>
                    <div class="modal-body">
                        <template if:true={selectedHomeworkForGrading}>
                            <p class="modal-subtitle">{selectedHomeworkForGrading.Title__c}</p>
                        </template>
                        <template if:true={modalErrorMsg}>
                            <div class="alert-error">{modalErrorMsg}</div>
                        </template>
                        <form onsubmit={saveGrade}>
                            <div class="form-group">
                                <label class="form-label">Puan (0-100)</label>
                                <input type="number" class="form-input" value={hwGrade} oninput={handleGradeChange} min="0" max="100" required />
                            </div>
                            <div class="form-group">
                                <label class="form-label">Durum</label>
                                <select class="form-input" value={hwGradeStatus} onchange={handleGradeStatusChange}>
                                    <option value="Completed">Tamamlandı</option>
                                    <option value="Incomplete">Eksik Yapıldı</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Geri Bildirim Notu</label>
                                <textarea class="form-input" value={hwTeacherComment} oninput={handleGradeCommentChange} rows="3" placeholder="Öğrenciye geri bildiriminizi yazın..."></textarea>
                            </div>
                            <div class="modal-actions">
                                <button type="button" class="btn-secondary" onclick={closeModals}>Vazgeç</button>
                                <button type="submit" class="btn-primary">Değerlendirmeyi Kaydet</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </template>

    </div>
</template>
