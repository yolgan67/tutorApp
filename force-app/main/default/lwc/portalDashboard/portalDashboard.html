<template>
    <div class="dashboard-wrapper">
        <!-- SIDEBAR -->
        <aside class="glass-sidebar">
            <div class="brand-logo">
                <span class="logo-emoji">✏️</span>
                <span class="brand-text">Çözüm Köşesi</span>
            </div>

            <ul class="nav-links">
                <li class={sidebarSummaryClass}>
                    <a href="#" data-tab="summary" onclick={handleTabClick}><span class="nav-icon">📊</span> Özet</a>
                </li>
                <li class={sidebarLessonsClass}>
                    <a href="#" data-tab="lessons" onclick={handleTabClick}><span class="nav-icon">📅</span> Derslerim</a>
                </li>
                <li class={sidebarHomeworksClass}>
                    <a href="#" data-tab="homeworks" onclick={handleTabClick}>
                        <span class="nav-icon">📚</span> Ödevlerim
                        <template if:true={pendingHomeworkCount}>
                            <span class="badge-count">{pendingHomeworkCount}</span>
                        </template>
                    </a>
                </li>
                <li class={sidebarExamsClass}>
                    <a href="#" data-tab="exams" onclick={handleTabClick}><span class="nav-icon">📝</span> Denemelerim</a>
                </li>
                <li class={sidebarPasswordClass}>
                    <a href="#" data-tab="password" onclick={handleTabClick}><span class="nav-icon">🔐</span> Şifre</a>
                </li>
            </ul>

            <div class="sidebar-footer">
                <button class="btn-logout" onclick={handleLogout}>🚪 Çıkış Yap</button>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="main-content">
            <template if:true={isLoading}>
                <div class="loader-overlay">
                    <div class="custom-spinner"></div>
                    <p class="loader-text">Yükleniyor...</p>
                </div>
            </template>

            <template if:false={isLoading}>
                <header class="top-bar">
                    <div class="greeting">
                        <h1>Hoş Geldin, <span class="student-highlight">{studentName}</span> 👋</h1>
                        <p class="tagline">Bugün de harika bir öğrenme günü seni bekliyor!</p>
                    </div>
                    <template if:true={studentType}>
                        <div class="student-type-pill">{studentType}</div>
                    </template>
                </header>

                <!-- ===== SUMMARY ===== -->
                <template if:true={isSummaryActive}>
                    <div class="tab-content animate-fade">

                        <!-- Exam Countdown (only for TYT/AYT and LGS students) -->
                        <template if:true={showExamCountdown}>
                            <div class={examCountdownClass}>
                                <div class="countdown-icon">🎯</div>
                                <div class="countdown-body">
                                    <p class="countdown-label">{examCountdownLabel}</p>
                                    <h2 class="countdown-days">{examCountdownDays}</h2>
                                    <p class="countdown-unit">gün kaldı</p>
                                </div>
                                <div class="countdown-message">
                                    <template if:true={examCountdownDays}>
                                        Her gün düzenli çalışmak seni hedefe götürür. Başarılar! 💪
                                    </template>
                                </div>
                            </div>
                        </template>

                        <!-- Metrics Row -->
                        <div class="metrics-row">
                            <div class="metric-card glass-card">
                                <div class="metric-icon">📅</div>
                                <div class="metric-body">
                                    <p class="metric-label">Yaklaşan Ders</p>
                                    <h3 class="metric-value">{nextLessonDate}</h3>
                                    <template if:true={nextLessonBranch}>
                                        <span class="metric-badge">{nextLessonBranch}</span>
                                    </template>
                                </div>
                            </div>
                            <div class="metric-card glass-card accent-card">
                                <div class="metric-icon">📝</div>
                                <div class="metric-body">
                                    <p class="metric-label">Bekleyen Ödev</p>
                                    <h3 class="metric-value">{pendingHomeworkCount} Adet</h3>
                                    <span class="metric-badge">Tamamlanmayı bekliyor</span>
                                </div>
                            </div>
                            <div class="metric-card glass-card">
                                <div class="metric-icon">🏫</div>
                                <div class="metric-body">
                                    <p class="metric-label">Okul / Sınıf</p>
                                    <h3 class="metric-value-sm">{studentSchool}</h3>
                                    <span class="metric-badge">{studentGrade}</span>
                                </div>
                            </div>
                        </div>

                        <!-- Upcoming Lessons Quick List -->
                        <div class="summary-panel glass-card">
                            <div class="panel-header">
                                <h2>Yaklaşan Dersler</h2>
                                <a href="#" data-tab="lessons" onclick={handleTabClick} class="panel-link">Tümünü Gör →</a>
                            </div>
                            <template if:true={lessons.length}>
                                <ul class="lesson-quick-list">
                                    <template for:each={lessons} for:item="lesson">
                                        <li key={lesson.Id} class="lesson-quick-item">
                                            <div class="lqi-date">
                                                <span class="lqi-day">{lesson.dayStr}</span>
                                                <span class="lqi-month">{lesson.monthStr}</span>
                                            </div>
                                            <div class="lqi-info">
                                                <h4>{lesson.Branch__c}</h4>
                                                <p>Saat {lesson.timeStr}</p>
                                            </div>
                                            <span class="status-badge scheduled">Planlandı</span>
                                        </li>
                                    </template>
                                </ul>
                            </template>
                            <template if:false={lessons.length}>
                                <div class="empty-state">Yakın tarihte planlanmış ders bulunmuyor.</div>
                            </template>
                        </div>
                    </div>
                </template>

                <!-- ===== LESSONS ===== -->
                <template if:true={isLessonsActive}>
                    <div class="tab-content animate-fade">
                        <div class="section-card glass-card">
                            <h2 class="section-title">📅 Tüm Derslerim</h2>
                            <template if:true={allLessons.length}>
                                <div class="table-responsive">
                                    <table class="premium-table">
                                        <thead>
                                            <tr>
                                                <th>Ders</th>
                                                <th>Branş</th>
                                                <th>Tarih &amp; Saat</th>
                                                <th>Süre</th>
                                                <th>Durum</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <template for:each={allLessons} for:item="lesson">
                                                <tr key={lesson.Id}>
                                                    <td class="font-bold">{lesson.Name}</td>
                                                    <td>{lesson.Branch__c}</td>
                                                    <td>{lesson.Date_Time__c}</td>
                                                    <td>⏱ {lesson.Duration_Minutes__c} dk</td>
                                                    <td><span class="status-badge">{lesson.Status__c}</span></td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>
                                <!-- Lesson Notes from Teacher -->
                                <template for:each={allLessons} for:item="lesson">
                                    <template if:true={lesson.Lesson_Notes__c}>
                                        <div key={lesson.Id} class="lesson-note-box">
                                            <p class="ln-title">📝 Öğretmen Notu — {lesson.Branch__c} / {lesson.Date_Time__c}</p>
                                            <p class="ln-text">{lesson.Lesson_Notes__c}</p>
                                        </div>
                                    </template>
                                </template>
                            </template>
                            <template if:false={allLessons.length}>
                                <div class="empty-state">Henüz ders kaydınız bulunmuyor.</div>
                            </template>
                        </div>
                    </div>
                </template>

                <!-- ===== HOMEWORKS ===== -->
                <template if:true={isHomeworksActive}>
                    <div class="tab-content animate-fade">
                        <div class="section-card glass-card">
                            <h2 class="section-title">📚 Ödevlerim</h2>
                            <template if:true={homeworks.length}>
                                <div class="homeworks-grid">
                                    <template for:each={homeworks} for:item="hw">
                                        <div key={hw.Id} class="homework-card glass-card">
                                            <div class="hw-header">
                                                <h3>{hw.Title__c}</h3>
                                                <span class={hw.badgeClass}>{hw.statusText}</span>
                                            </div>
                                            <p class="hw-desc">{hw.Description__c}</p>
                                            <div class="hw-meta">
                                                <span>📅 Son Teslim: {hw.dueDateStr}</span>
                                            </div>
                                            <template if:true={hw.Completed_Questions__c}>
                                                <div class="hw-stats-box">
                                                    <div class="stats-row">
                                                        <span>Çözülen: <strong>{hw.Completed_Questions__c}</strong></span>
                                                        <span class="text-green">✔ <strong>{hw.Correct_Answers__c}</strong></span>
                                                        <span class="text-red">✘ <strong>{hw.Wrong_Answers__c}</strong></span>
                                                    </div>
                                                    <template if:true={hw.Student_Comment__c}>
                                                        <p class="comment-text">"<em>{hw.Student_Comment__c}</em>"</p>
                                                    </template>
                                                </div>
                                            </template>
                                            <template if:true={hw.isGraded}>
                                                <div class="teacher-feedback-box">
                                                    <p class="grade-label">💯 Puan: <strong>{hw.Grade__c}/100</strong></p>
                                                    <template if:true={hw.Teacher_Comment__c}>
                                                        <p class="comment-text"><strong>Öğretmen:</strong> "{hw.Teacher_Comment__c}"</p>
                                                    </template>
                                                </div>
                                            </template>
                                            <template if:true={hw.isPending}>
                                                <button class="btn-submit-hw" data-id={hw.Id} onclick={openSubmitHomework}>
                                                    ✍️ Çözüm Gönder
                                                </button>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </template>
                            <template if:false={homeworks.length}>
                                <div class="empty-state">Henüz ödev tanımlanmamış.</div>
                            </template>
                        </div>
                    </div>
                </template>

                <!-- ===== EXAMS ===== -->
                <template if:true={isExamsActive}>
                    <div class="tab-content animate-fade">
                        <div class="section-card glass-card">
                            <div class="section-header-row">
                                <h2 class="section-title">📝 Deneme Sonuçlarım</h2>
                                <button class="btn-add" onclick={openAddExam}>+ Deneme Sonucu Ekle</button>
                            </div>
                            <template if:true={exams.length}>
                                <div class="table-responsive">
                                    <table class="premium-table">
                                        <thead>
                                            <tr>
                                                <th>Sınav</th>
                                                <th>Tarih</th>
                                                <th>Toplam</th>
                                                <th>Doğru</th>
                                                <th>Yanlış</th>
                                                <th>Mat. D/Y</th>
                                                <th>Toplam Net</th>
                                                <th>Mat. Net</th>
                                                <th>Başarı</th>
                                                <th>Öğretmen Yorumu</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <template for:each={exams} for:item="ex">
                                                <tr key={ex.Id}>
                                                    <td class="font-bold">{ex.Exam_Title__c}</td>
                                                    <td>{ex.examDateStr}</td>
                                                    <td>{ex.Total_Questions__c}</td>
                                                    <td class="text-green font-bold">{ex.Total_Correct__c}</td>
                                                    <td class="text-red font-bold">{ex.Total_Wrong__c}</td>
                                                    <td>{ex.Math_Correct__c}D / {ex.Math_Wrong__c}Y</td>
                                                    <td class="text-purple font-bold">{ex.totalNetFormatted}</td>
                                                    <td class="text-accent font-bold">{ex.mathNetFormatted}</td>
                                                    <td><span class="status-badge">{ex.Score__c}%</span></td>
                                                    <td class="comment-cell">{ex.Teacher_Feedback__c}</td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>
                            </template>
                            <template if:false={exams.length}>
                                <div class="empty-state">Henüz deneme kaydedilmemiş. Yukarıdaki butonu kullan!</div>
                            </template>
                        </div>
                    </div>
                </template>

                <!-- ===== PASSWORD ===== -->
                <template if:true={isPasswordActive}>
                    <div class="tab-content animate-fade">
                        <div class="section-card glass-card max-w-sm">
                            <h2 class="section-title">🔐 Şifre Değiştir</h2>
                            <template if:true={pwdErrorMsg}>
                                <div class="alert-error">{pwdErrorMsg}</div>
                            </template>
                            <template if:true={pwdSuccessMsg}>
                                <div class="alert-success">{pwdSuccessMsg}</div>
                            </template>
                            <form class="password-form" onsubmit={handlePasswordSubmit}>
                                <div class="form-group">
                                    <label class="form-label">Mevcut Şifre</label>
                                    <input type="password" class="form-input" value={currentPassword} oninput={handleCurPwd} required />
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Yeni Şifre (En az 6 karakter)</label>
                                    <input type="password" class="form-input" value={newPassword} oninput={handleNewPwd} required />
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Yeni Şifre Tekrar</label>
                                    <input type="password" class="form-input" value={confirmPassword} oninput={handleConfPwd} required />
                                </div>
                                <button type="submit" class="btn-submit">Şifremi Güncelle</button>
                            </form>
                        </div>
                    </div>
                </template>
            </template>
        </main>

        <!-- HOMEWORK MODAL -->
        <template if:true={showHomeworkModal}>
            <div class="modal-backdrop" onclick={closeHomeworkModal}>
                <div class="modal-card glass-card animate-zoom" onclick={stopPropagation}>
                    <div class="modal-header">
                        <h3>✍️ Ödev Gönder</h3>
                        <button class="modal-close" onclick={closeHomeworkModal}>&times;</button>
                    </div>
                    <div class="modal-body">
                        <template if:true={activeHomework}>
                            <p class="modal-hw-title">{activeHomework.Title__c}</p>
                        </template>
                        <template if:true={modalErrorMsg}>
                            <div class="alert-error">{modalErrorMsg}</div>
                        </template>
                        <form onsubmit={handleHomeworkSubmit}>
                            <div class="form-row">
                                <div class="form-group">
                                    <label class="form-label">Çözülen Soru</label>
                                    <input type="number" class="form-input" value={hwCompletedQuestions} oninput={handleHwCompletedChange} min="0" required />
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Doğru</label>
                                    <input type="number" class="form-input" value={hwCorrects} oninput={handleHwCorrectsChange} min="0" required />
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Yanlış</label>
                                    <input type="number" class="form-input" value={hwWrongs} oninput={handleHwWrongsChange} min="0" required />
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Notunuz (isteğe bağlı)</label>
                                <textarea class="form-input" value={hwComment} oninput={handleHwCommentChange} rows="3" placeholder="Zorlandığınız konuları yazabilirsiniz..."></textarea>
                            </div>
                            <button type="submit" class="btn-submit mt-4">Çözümü Gönder</button>
                        </form>
                    </div>
                </div>
            </div>
        </template>

        <!-- EXAM MODAL -->
        <template if:true={showExamModal}>
            <div class="modal-backdrop" onclick={closeExamModal}>
                <div class="modal-card glass-card animate-zoom" onclick={stopPropagation}>
                    <div class="modal-header">
                        <h3>📝 Deneme Sonucu Ekle</h3>
                        <button class="modal-close" onclick={closeExamModal}>&times;</button>
                    </div>
                    <div class="modal-body">
                        <template if:true={modalErrorMsg}>
                            <div class="alert-error">{modalErrorMsg}</div>
                        </template>
                        <form onsubmit={handleExamSubmit}>
                            <div class="form-group">
                                <label class="form-label">Sınav Adı</label>
                                <input type="text" class="form-input" value={examTitle} oninput={handleExamTitle} placeholder="Örn: TYT Deneme 12" required />
                            </div>
                            <div class="form-group">
                                <label class="form-label">Sınav Tarihi</label>
                                <input type="date" class="form-input" value={examDate} onchange={handleExamDate} required />
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label class="form-label">Toplam Soru</label>
                                    <input type="number" class="form-input" value={examTotalQuestions} oninput={handleExamTotalQ} min="0" required />
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Toplam Doğru</label>
                                    <input type="number" class="form-input" value={examTotalCorrect} oninput={handleExamTotalC} min="0" required />
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Toplam Yanlış</label>
                                    <input type="number" class="form-input" value={examTotalWrong} oninput={handleExamTotalW} min="0" required />
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label class="form-label">Matematik Doğru</label>
                                    <input type="number" class="form-input" value={examMathCorrect} oninput={handleExamMathC} min="0" required />
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Matematik Yanlış</label>
                                    <input type="number" class="form-input" value={examMathWrong} oninput={handleExamMathW} min="0" required />
                                </div>
                            </div>
                            <button type="submit" class="btn-submit mt-4">Sonucu Kaydet</button>
                        </form>
                    </div>
                </div>
            </div>
        </template>
    </div>
</template>
