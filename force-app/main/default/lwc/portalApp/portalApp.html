<template>
  <div class="app-container">
    <!-- LANDING PAGE -->
    <template if:false={isAuthenticated}>
      <header class="landing-header">
        <div class="logo-container">
          <span class="logo-icon">✏️</span>
          <span class="logo-text">Çözüm Köşesi</span>
        </div>
        <nav class="landing-nav">
          <a href="#services" class="nav-link">Eğitimlerimiz</a>
          <a href="#vision" class="nav-link">Yaklaşımımız</a>
          <button class="btn-primary" onclick={openLogin}>Portal Girişi</button>
        </nav>
      </header>

      <section class="hero-section">
        <div class="hero-content">
          <div class="tagline">💜 ORTAÖĞRETİM MATEMATİĞİ, GEOMETRİ & KİŞİSEL KOÇLUK</div>
          <h1 class="hero-title">
            Matematiği Sevgiyle Öğreniyor,
            <span class="gradient-text">Geleceğe Güvenle Adım Atıyoruz!</span>
          </h1>
          <p class="hero-description">
            Her öğrencimin öğrenme yolculuğu benzersizdir. Matematik temellerini
            neşeyle sağlamlaştırıyor, geometriyi şekillerin eğlenceli dünyasıyla
            sevdiriyor ve kişiye özel rehberlikle başarıya giden yolda sevgiyle
            eşlik ediyorum.
          </p>
          <div class="hero-actions">
            <button class="btn-large" onclick={openLogin}>
              Öğrenci &amp; Veli Portalına Giriş
            </button>
          </div>
        </div>
        <div class="hero-badge-container">
          <div class="hero-image-wrapper">
            <div class="hero-image-bg-glow"></div>
            <img src={joyfulTutorUrl} class="hero-image-tutor" alt="Çözüm Köşesi" />
          </div>
        </div>
      </section>

      <section id="services" class="features-section">
        <h2 class="section-title">Neler <span class="gradient-text">Yapıyoruz?</span></h2>
        <div class="features-grid">
          <div class="feature-card glass-card">
            <div class="feature-icon-wrapper">📚</div>
            <h4>5–9. Sınıf Matematik</h4>
            <p>Temel matematik kavramlarını somutlaştırarak güçlendiriyor, LGS ve yazılı sınavlara neşeli, kaygısız yöntemlerle hazırlanıyoruz.</p>
          </div>
          <div class="feature-card glass-card">
            <div class="feature-icon-wrapper">📐</div>
            <h4>Lise Geometri</h4>
            <p>Formülleri ezberlemek yerine şekillerin dünyasını keşfediyor; TYT/AYT geometrisini korkulu rüyadan eğlenceli bulmacaya dönüştürüyoruz.</p>
          </div>
          <div class="feature-card glass-card">
            <div class="feature-icon-wrapper">✨</div>
            <h4>Kişisel Öğrenci Koçluğu</h4>
            <p>Haftalık planlama, sınav stratejileri, motivasyon takibi ve gelişim analizi ile hedeflere sevgi dolu rehberlikle ilerliyoruz.</p>
          </div>
        </div>
      </section>

      <footer class="landing-footer">
        <p>&copy; 2026 Çözüm Köşesi — Matematik Özel Ders &amp; Bireysel Gelişim Atölyesi. Tüm Hakları Saklıdır.</p>
      </footer>

      <template if:true={showLoginModal}>
        <div class="modal-overlay" onclick={closeLogin}>
          <div class="modal-content glass-card animate-zoom" onclick={stopPropagation}>
            <button class="modal-close" onclick={closeLogin}>&times;</button>
            <c-portal-login onlogin={handleLogin}></c-portal-login>
          </div>
        </div>
      </template>
    </template>

    <!-- DASHBOARDS -->
    <template if:true={isAuthenticated}>
      <template if:true={isStudent}>
        <c-portal-dashboard onlogout={handleLogout}></c-portal-dashboard>
      </template>
      <template if:true={isTeacher}>
        <c-tutor-portal-dashboard onlogout={handleLogout}></c-tutor-portal-dashboard>
      </template>
      <template if:true={isParent}>
        <c-parent-portal-dashboard onlogout={handleLogout}></c-parent-portal-dashboard>
      </template>
    </template>
  </div>
</template>
